{% extends "base.html" %}
{% block title %}Login – Quinta da Baroneza{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-flag-fill text-success" style="font-size:2.5rem"></i>
          <h4 class="mt-2 fw-bold">Quinta da Baroneza</h4>
          <p class="text-muted small">Agendamento de Tee Time</p>
        </div>
        {% if error %}
        <div class="alert alert-danger py-2"><i class="bi bi-exclamation-triangle me-1"></i>{{ error }}</div>
        {% endif %}
        <form method="post">
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label">Senha</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-success w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
