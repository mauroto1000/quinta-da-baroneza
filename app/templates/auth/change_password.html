{% extends "base.html" %}
{% block title %}Alterar Senha{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h4 class="mb-4"><i class="bi bi-key me-2"></i>Alterar Senha</h4>
    {% if success %}
    <div class="alert alert-success"><i class="bi bi-check-circle me-1"></i>Senha alterada com sucesso!</div>
    {% endif %}
    {% if error %}
    <div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-1"></i>{{ error }}</div>
    {% endif %}
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Senha Atual</label>
            <input type="password" name="current_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Nova Senha</label>
            <input type="password" name="new_password" class="form-control" required minlength="6">
          </div>
          <div class="mb-4">
            <label class="form-label">Confirmar Nova Senha</label>
            <input type="password" name="confirm_password" class="form-control" required minlength="6">
          </div>
          <button type="submit" class="btn btn-success">Salvar</button>
          <a href="/schedule" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
